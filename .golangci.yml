# .golangci.yml (Place in your repository root)

run:
  # The default concurrency is the number of available CPUs
  concurrency: 4
  # Timeout for analysis, increased slightly for larger workspaces
  timeout: 5m
  # Exit code when issues are found
  issues-exit-code: 1
  # Include test files in the analysis
  tests: true

output:
  # Choose from: colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  formats:
    - format: colored-line-number

linters:
  # Disable all default linters so we can explicitly declare what we want
  disable-all: true
  enable:
    - revive       # The modern fast replacement for deprecated golint
    - govet        # Official Go tool for catching suspicious constructs (printf args, shadowing)
    - staticcheck  # Advanced static analysis engine (replaces ui.diagnostic.analyses settings)
    - errcheck     # Ensures you aren't silently ignoring returned errors
    - gocyclo      # Computes cyclomatic complexity to keep functions readable
    - misspell     # Catch spelling mistakes in comments and strings
    - unparam      # Finds unused function parameters
    - gofumpt      # Enforces stricter formatting rules than gofmt (replaces ui.diagnostic.formatting settings)

linters-settings:
  revive:
    # Set the minimum confidence level (replaces your old -min_confidence=0.8 setting)
    confidence: 0.8
    # Enforce standard idiomatic Go styling rules
    rules:
      - name: exported
        severity: warning
        arguments:
          - checkPrivateReceivers: true
      - name: argument-limit
        severity: warning
        arguments: [5] # Warn if a function takes more than 5 arguments
      - name: blank-imports
      - name: context-as-argument # Ensures context.Context is always the first argument

  gocyclo:
    # Minimal complexity to report (15 is a standard, healthy upper limit)
    min-complexity: 15

  govet:
    # Enable all analysis checks within govet
    enable-all: true

issues:
  # Exclude known noisy directories (like GoReleaser's build output)
  exclude-dirs:
    - dist
    - .gopath
  # Maximum issues count per linter, 0 means unlimited
  max-issues-per-linter: 0
  max-same-issues: 0
