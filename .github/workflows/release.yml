name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Run unit tests
        run: go test ./... -v

  build_release:
    name: build + goreleaser
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Extract metadata
        id: meta
        run: |
          # Strip 'v' prefix for WinGet specification requirements
          RAW_VERSION="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${RAW_VERSION#v}"
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${RAW_VERSION}" >> $GITHUB_OUTPUT

      - name: GoReleaser (build artifacts)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Helper wiring validation (no live Terraform Cloud call)
      # -------------------------------------------------------
      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.7

      - name: E2E helper wiring validation
        env:
          TF_TEST_TOKEN: ${{ vars.TF_TEST_TOKEN }}
          TF_CLI_CONFIG_FILE: /tmp/tfcred-test/terraform.tfrc
        run: |
          set -euo pipefail
          echo "[e2e] validating tfcred helper wiring with the compiled binary"

          mkdir -p /tmp/tfcred-test/bin /tmp/tfcred-test/home
          export PATH="/tmp/tfcred-test/bin:$PATH"
          export HOME="/tmp/tfcred-test/home"
          export APPDATA="/tmp/tfcred-test/home"

          go build -ldflags "-X main.version=${{ steps.meta.outputs.version }}" -o /tmp/tfcred-test/bin/tfcred ./cmd/terraform-credentials-custom/tfcred
          go build -ldflags "-X main.version=${{ steps.meta.outputs.version }}" -o /tmp/tfcred-test/bin/terraform-credentials-custom ./cmd/terraform-credentials-custom
          chmod +x /tmp/tfcred-test/bin/tfcred /tmp/tfcred-test/bin/terraform-credentials-custom

          tfcred --help >/dev/null
          tfcred version
          tfcred init --domain app.terraform.io

          if [ -n "${TF_TEST_TOKEN:-}" ]; then
            echo "[e2e] injecting test team token metadata into tfcred"
            tfcred add --context ci-team-test --org ci-test-org --token-type team --domain app.terraform.io --token "$TF_TEST_TOKEN"
          else
            echo "[e2e] TF_TEST_TOKEN not configured; validating metadata-only registration path"
            tfcred add --context ci-team-test --org ci-test-org --token-type team --domain app.terraform.io
          fi

          pwsh -File ./scripts/install.ps1

          test -f "$TF_CLI_CONFIG_FILE"
          grep -q 'credentials_helper "custom"' "$TF_CLI_CONFIG_FILE"

          tfcred list
          tfcred doctor
          terraform version


      # -------------------------------------------------------
      # Trigger winget pipeline dispatch loop
      # -------------------------------------------------------
      - name: Trigger winget workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "winget.yml",
              ref: "main",
              inputs: {
                version: "${{ steps.meta.outputs.version }}",
                tag: "${{ steps.meta.outputs.tag }}"
              }
            });
