name: winget
on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  create_pr:
    name: create winget PR
    runs-on: ubuntu-latest
    steps:
      # -------------------------------------------------------
      # 1. Resolve the GoReleaser Archive from Releases
      # -------------------------------------------------------
      - name: Resolve release assets
        id: assets
        uses: actions/github-script@v7
        env:
          INPUT_TAG: ${{ inputs.tag }}
        with:
          script: |
            const tag = process.env.INPUT_TAG;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            
            const assets = release.data.assets;
            const match = assets.find(a => 
              a.name.toLowerCase().includes("windows") && 
              a.name.toLowerCase().includes("amd64") && 
              a.name.endsWith(".zip")
            );
            
            if (!match) {
              throw new Error("Target Windows AMD64 .zip archive not found in release assets.");
            }
            
            core.setOutput("installer_url", match.browser_download_url);
            core.setOutput("asset_name", match.name);

      # -------------------------------------------------------
      # 2. Download Archive + Compute Dynamic SHA256 Hash
      # -------------------------------------------------------
      - name: Download release asset and hash
        id: crypto
        run: |
          curl -L "${{ steps.assets.outputs.installer_url }}" -o artifact.zip
          SHA=$(sha256sum artifact.zip | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # 3. Create Upstream PR Using Your Existing Fork & PAT
      # -------------------------------------------------------
      - name: Submit manifests directly via GitHub API
        uses: actions/github-script@v7
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INSTALLER_URL: ${{ steps.assets.outputs.installer_url }}
          INSTALLER_SHA: ${{ steps.crypto.outputs.sha }}
        with:
          github-token: ${{ secrets.WINGET_PAT }}
          script: |
            const fs = require('fs');
            const version = process.env.INPUT_VERSION;
            const url = process.env.INSTALLER_URL;
            const sha = process.env.INSTALLER_SHA;
            const branchName = `winget-update-tfcred-${version}`;
            
            // Define manifest contents matching strict WinGet rules
            const file1Content = `PackageIdentifier: amiasea.tfcred\nPackageVersion: ${version}\nManifestType: version\nManifestVersion: 1.6.0`;
            
            const file2Content = `PackageIdentifier: amiasea.tfcred\nPackageVersion: ${version}\nInstallerLocale: en-US\nArchitecture: x64\nInstallerType: zip\nNestedInstallerType: portable\nNestedInstallerFiles:\n  - RelativeFilePath: tfcred.exe\n    PortableCommandAlias: tfcred\n  - RelativeFilePath: terraform-credentials-amiasea.exe\n    PortableCommandAlias: terraform-credentials-amiasea\nInstallers:\n  - Architecture: x64\n    InstallerUrl: ${url}\n    InstallerSha256: ${sha}\nManifestType: installer\nManifestVersion: 1.6.0`;
            
            const file3Content = `PackageIdentifier: amiasea.tfcred\nPackageVersion: ${version}\nPackageLocale: en-US\nPublisher: amiasea\nPackageName: tfcred\nLicense: MIT\nShortDescription: Terraform credential context manager\nManifestType: defaultLocale\nManifestVersion: 1.6.0`;

            const manifestPath = `manifests/a/amiasea/tfcred/${version}`;
            
            console.log(`[winget] Creating branch ${branchName} inside amiasea/winget-pkgs...`);
            
            // 1. Get the latest SHA from master branch of your fork
            const masterRef = await github.rest.git.getRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: 'heads/master'
            });
            
            // 2. Create your new tracking feature branch
            await github.rest.git.createRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: `refs/heads/${branchName}`,
              sha: masterRef.data.object.sha
            });
            
            // Helper function to create individual file commits inside your branch via API
            async function commitFile(path, content, message) {
              await github.rest.repos.createOrUpdateFileContents({
                owner: 'amiasea',
                repo: 'winget-pkgs',
                path: path,
                message: message,
                content: Buffer.from(content).toString('base64'),
                branch: branchName
              });
            }

            console.log(`[winget] Writing manifest files to branch...`);
            await commitFile(`${manifestPath}/amiasea.tfcred.yaml`, file1Content, `feat: add version manifest for ${version}`);
            await commitFile(`${manifestPath}/amiasea.tfcred.installer.yaml`, file2Content, `feat: add installer manifest for ${version}`);
            await commitFile(`${manifestPath}/amiasea.tfcred.locale.en-US.yaml`, file3Content, `feat: add locale manifest for ${version}`);

            console.log(`[winget] Opening Pull Request against microsoft/winget-pkgs...`);
            const pr = await github.rest.pulls.create({
              owner: 'microsoft',
              repo: 'winget-pkgs',
              title: `New version: amiasea.tfcred version ${version}`,
              body: `Automated WinGet submission update for amiasea.tfcred version ${version}.`,
              head: `amiasea:${branchName}`,
              base: 'master'
            });

            console.log(`[winget] Success! PR Opened: ${pr.data.html_url}`);
            core.setOutput("pr_url", pr.data.html_url);

      # -------------------------------------------------------
      # 4. Step Summary Output Dashboard
      # -------------------------------------------------------
      - name: Summary
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "## Winget PR Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Version Sent: v$INPUT_VERSION" >> $GITHUB_STEP_SUMMARY
